// libs/common/src/proto/rater.proto
syntax = "proto3";

package rater;

service RaterService {
  rpc GetCrossRate (CrossRateRequest) returns (CrossRateResponse);
  rpc PingRater (PingRequest) returns (PingResponse);
  rpc CheckHealth (HealthRequest) returns (HealthResponse);
}

message CrossRateRequest {
  string base = 1;
  string quote = 2;
}

message CrossRateResponse {
  double rate = 1;
}

message PingRequest {}

message PingResponse {
  string status = 1;
  string provider = 2;
  string rates = 3;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string redis = 2;
  string memory = 3;
}
