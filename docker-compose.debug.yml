# docker compose -f docker-compose.debug.yml up --build

version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  # Наш новий гравець у команді інфраструктури
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379" # Стандартний порт, доступний локально для твоїх дебаг-тулзів
    volumes:
      - redis_data:/data

  gateway:
    build:
      context: .
      args:
        APP_NAME: gateway
        BUILD_MODE: debug
    ports:
      - "3000:3000"
      - "9230:9229"
    depends_on:
      - accounts
      - auth
      - logger
      - rater # Додав у залежності, щоб запуск був послідовним
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ACCOUNTS_HOST=accounts
      - AUTH_HOST=auth
      - LOGGER_HOST=logger
      - RATER_HOST=rater
      - APP_NAME=gateway

  auth:
    build:
      context: .
      args:
        APP_NAME: auth
        BUILD_MODE: debug
    ports:
      - "3003:3003"
      - "9233:9229"
    depends_on:
      - db
      - rabbitmq
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgres://user:password@db:5432/auth_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - APP_NAME=auth

  accounts:
    build:
      context: .
      args:
        APP_NAME: accounts
        BUILD_MODE: debug
    ports:
      - "3001:3001"
      - "9231:9229"
    depends_on:
      - db
      - rabbitmq
      - redis # Чекаємо на старт Redis
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/bank_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379 # Якщо захочеш читати з Redis напряму (або через rater)
      - APP_NAME=accounts

  logger:
    build:
      context: .
      args:
        APP_NAME: logger
        BUILD_MODE: debug
    ports:
      - "3002:3002"
      - "9232:9229"
    depends_on:
      - db
      - rabbitmq
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/audit_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - APP_NAME=logger

  # Новий мікросервіс для збору курсів валют
  rater:
    build:
      context: .
      args:
        APP_NAME: rater
        BUILD_MODE: debug
    ports:
      - "3004:3004" # Новий вільний порт для мікросервісу
      - "9234:9229" # Порт для дебагу Node.js (інспектор)
    depends_on:
      - rabbitmq
      - redis
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379 # Підключення до нашого контейнера
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY} # Прокидаємо ключ із .env
      - APP_NAME=rater

volumes:
  postgres_data:
  redis_data: