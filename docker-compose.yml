version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Порт для передачі даних
      - "15672:15672" # Панель управління (User: guest, Pass: guest)

  gateway:
    build:
      context: .
      args:
        APP_NAME: gateway
    ports:
      - "3000:3000"
      - "9230:9229"    # debug порт gateway (9230 на хості → 9229 у контейнері)
    depends_on:
      - accounts
      - logger
      - rabbitmq
    environment:
      - APP_NAME=gateway
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - DATABASE_URL=postgres://user:password@db:5432/bank_db
      - DB_HOST=db
      - ACCOUNTS_HOST=accounts
      - LOGGER_HOST=logger
    command: npm run start:debug   # важливо: запуск в debug‑режимі

  accounts:
    build:
      context: .
      args:
        APP_NAME: accounts
    ports:
      - "3001:3001"
      - "9231:9229"    # debug порт accounts (9231 на хості)
    depends_on:
      - db
      - rabbitmq
      - logger
    environment:
      - APP_NAME=accounts
      - DATABASE_URL=postgres://user:password@db:5432/bank_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - DB_HOST=db
      - LOGGER_HOST=logger
    command: npm run start:debug

  logger:
    build:
      context: .
      args:
        APP_NAME: logger
    ports:
      - "3002:3002"
      - "9232:9229"    # debug порт logger (9232 на хості)
    depends_on:
      - db
      - rabbitmq
    environment:
      - APP_NAME=logger
      - DATABASE_URL=postgres://user:password@db:5432/bank_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - DB_HOST=db
    command: npm run start:debug

volumes:
  postgres_data: